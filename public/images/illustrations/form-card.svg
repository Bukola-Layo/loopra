<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" fill="none">
  <rect width="750" height="500" rx="16" fill="#f8fafc"/>
  <!-- Background pattern -->
  <circle cx="680" cy="80" r="180" fill="#26AEC0" opacity="0.06"/>
  <circle cx="100" cy="420" r="140" fill="#26AEC0" opacity="0.05"/>
  <circle cx="400" cy="460" r="100" fill="#26AEC0" opacity="0.04"/>
  
  <!-- Browser chrome -->
  <rect x="95" y="50" width="560" height="400" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="95" y="50" width="560" height="44" rx="12" fill="#f1f5f9"/>
  <rect x="95" y="82" width="560" height="12" fill="#f1f5f9"/>
  <circle cx="118" cy="72" r="6" fill="#ef4444"/>
  <circle cx="138" cy="72" r="6" fill="#f59e0b"/>
  <circle cx="158" cy="72" r="6" fill="#22c55e"/>
  
  <!-- URL bar -->
  <rect x="210" y="64" width="260" height="16" rx="8" fill="white" stroke="#e2e8f0" stroke-width="0.5"/>
  <circle cx="222" cy="72" r="3" fill="#94a3b8"/>
  <line x1="228" y1="72" x2="260" y2="72" stroke="#94a3b8" stroke-width="0.8" stroke-linecap="round"/>
  
  <!-- Page content -->
  <!-- Header area -->
  <rect x="280" y="110" width="80" height="6" rx="3" fill="#cbd5e1"/>
  <rect x="300" y="124" width="40" height="4" rx="2" fill="#e2e8f0"/>
  
  <!-- Form card -->
  <rect x="160" y="148" width="430" height="270" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Form header -->
  <rect x="190" y="170" width="140" height="8" rx="4" fill="#0f172a" opacity="0.9"/>
  <rect x="190" y="186" width="370" height="5" rx="2.5" fill="#94a3b8"/>
  
  <!-- Form fields -->
  <rect x="190" y="216" width="170" height="5" rx="2.5" fill="#334155" opacity="0.7"/>
  <rect x="190" y="230" width="370" height="38" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <rect x="190" y="284" width="140" height="5" rx="2.5" fill="#334155" opacity="0.7"/>
  <rect x="190" y="298" width="370" height="38" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Submit button -->
  <rect x="190" y="358" width="370" height="42" rx="8" fill="#dd2d4a"/>
  <rect x="330" y="375" width="90" height="6" rx="3" fill="white" opacity="0.9"/>
  
  <!-- Decorative elements -->
  <!-- Email icon -->
  <rect x="540" y="110" width="32" height="24" rx="4" fill="#26AEC0" opacity="0.12"/>
  <path d="M546 116l10 7 10-7" stroke="#26AEC0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Checkmark decoration -->
  <circle cx="620" cy="180" r="20" fill="#26AEC0" opacity="0.08"/>
  <path d="M614 180l4 4 8-8" stroke="#26AEC0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Stats decoration -->
  <rect x="540" y="240" width="60" height="34" rx="6" fill="#26AEC0" opacity="0.06"/>
  <rect x="550" y="250" width="40" height="4" rx="2" fill="#26AEC0" opacity="0.3"/>
  <rect x="550" y="260" width="25" height="3" rx="1.5" fill="#26AEC0" opacity="0.2"/>
  
  <!-- Dots pattern -->
  <circle cx="120" cy="340" r="2" fill="#26AEC0" opacity="0.15"/>
  <circle cx="140" cy="320" r="1.5" fill="#26AEC0" opacity="0.12"/>
  <circle cx="110" cy="360" r="1.5" fill="#26AEC0" opacity="0.1"/>
  <circle cx="130" cy="380" r="2" fill="#26AEC0" opacity="0.08"/>
  <circle cx="640" cy="380" r="1.5" fill="#26AEC0" opacity="0.12"/>
  <circle cx="660" cy="360" r="2" fill="#26AEC0" opacity="0.1"/>
  <circle cx="650" cy="400" r="1.5" fill="#26AEC0" opacity="0.08"/>
  
  <!-- Shadow filter -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>
</svg>